name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: macos-15
    timeout-minutes: 35
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: |
          set -euo pipefail
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi
          xcodegen version

      - name: Verify generated project is committed
        run: |
          set -euo pipefail
          if [[ -f project.yml ]]; then
            xcodegen generate
            git diff --exit-code -- project.yml '*.xcodeproj/**'
          else
            echo "project.yml is not present in this governance-only checkout; project drift check is deferred."
          fi

      - name: Run repository governance tests
        run: python3 -m unittest discover -s tests -p 'test_*.py'

      - name: Run lean repository verification
        run: |
          set -euo pipefail
          if [[ -f scripts/loop/verify-fast.sh ]]; then
            bash scripts/loop/verify-fast.sh
          elif [[ -f scripts/verify-fast.sh ]]; then
            bash scripts/verify-fast.sh
          else
            echo "No fast verification script; using compiler and repository fallbacks."
            swiftc --version
            git diff --check
          fi

      - name: Run tests and unsigned Simulator build
        run: |
          set -euo pipefail
          if [[ -f scripts/loop/verify-focused.sh ]]; then
            bash scripts/loop/verify-focused.sh
            exit 0
          fi
          if [[ -f scripts/verify.sh ]]; then
            bash scripts/verify.sh
            exit 0
          fi

          found_build_target=false
          if [[ -f Package.swift ]]; then
            swift test
            found_build_target=true
          fi

          project="$(find . -maxdepth 1 -name '*.xcodeproj' -print -quit)"
          if [[ -n "$project" ]]; then
            found_build_target=true
            scheme="$(xcodebuild -project "$project" -list -json | jq -r '.project.schemes[0] // empty')"
            if [[ -z "$scheme" ]]; then
              echo "No shared scheme found in $project" >&2
              exit 1
            fi
            device_id="$(xcrun simctl list devices available -j | jq -r '[.devices[][] | select(.name | startswith("iPhone"))][0].udid // empty')"
            if [[ -z "$device_id" ]]; then
              echo "No available iPhone Simulator found" >&2
              exit 1
            fi
            xcodebuild test \
              -project "$project" \
              -scheme "$scheme" \
              -destination "platform=iOS Simulator,id=$device_id" \
              CODE_SIGNING_ALLOWED=NO
            xcodebuild build \
              -project "$project" \
              -scheme "$scheme" \
              -destination 'generic/platform=iOS Simulator' \
              CODE_SIGNING_ALLOWED=NO
          fi

          if [[ "$found_build_target" == false ]]; then
            echo "No Swift package or Xcode project yet; governance tests are the runnable slice."
          fi
