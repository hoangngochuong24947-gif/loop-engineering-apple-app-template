name: Repository Policy

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: policy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  policy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reject direct push to main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          pull_count="$(gh api \
            -H 'Accept: application/vnd.github+json' \
            "/repos/$GITHUB_REPOSITORY/commits/$GITHUB_SHA/pulls" \
            --jq 'length')"
          if [[ "$pull_count" == "0" ]]; then
            echo "Direct push to main detected: $GITHUB_SHA has no associated pull request." >&2
            exit 1
          fi

      - name: Require linked Issue on pull requests
        if: github.event_name == 'pull_request'
        run: |
          python3 - <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          event = json.loads(Path(os.environ["GITHUB_EVENT_PATH"]).read_text())
          body = event["pull_request"].get("body") or ""
          if not re.search(r"(?i)\b(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#\d+\b", body):
              raise SystemExit("PR body must link its Issue with Closes/Fixes/Resolves #<number>")
          PY

      - name: Scan added lines for common secrets
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          empty_tree="$(git hash-object -t tree /dev/null)"
          if [[ -z "$BASE_SHA" || "$BASE_SHA" =~ ^0+$ ]]; then
            BASE_SHA="$empty_tree"
          fi
          git diff --unified=0 "$BASE_SHA" "$HEAD_SHA" -- . \
            ':(exclude).github/workflows/policy.yml' > /tmp/added-lines.diff
          python3 - <<'PY'
          import re
          from pathlib import Path

          patterns = {
              "private key": re.compile(r"-----BEGIN [A-Z0-9 ]*PRIVATE KEY-----"),
              "GitHub token": re.compile(r"\bgh[pousr]_[A-Za-z0-9]{20,}\b"),
              "AWS access key": re.compile(r"\bAKIA[0-9A-Z]{16}\b"),
              "bearer token": re.compile(r"(?i)\bAuthorization:\s*Bearer\s+[A-Za-z0-9._~-]{16,}"),
          }
          findings = []
          for line in Path("/tmp/added-lines.diff").read_text(errors="replace").splitlines():
              if not line.startswith("+") or line.startswith("+++"):
                  continue
              for name, pattern in patterns.items():
                  if pattern.search(line):
                      findings.append(name)
          if findings:
              raise SystemExit("Possible committed secret in added lines: " + ", ".join(sorted(set(findings))))
          PY

      - name: Check templates and workflow contracts
        run: python3 -m unittest discover -s tests -p 'test_repository_governance.py'

      - name: Check patch whitespace
        run: git diff --check
