name: Bug report
description: Capture a reproducible failure before changing code.
title: "[Bug] "
labels:
  - type/bug
body:
  - type: textarea
    id: outcome
    attributes:
      label: Outcome
      description: What working behavior must be restored?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Give the shortest deterministic steps, environment, and observed result.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope and exclusions
      description: Name the affected workflow and what this fix must not change.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Attach logs, screenshots, failing commands, and the first known bad SHA when available.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance
      description: State the regression behavior and important edge cases.
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification
      description: Name the regression test and real runtime proof.
    validations:
      required: true
  - type: dropdown
    id: data_risk
    attributes:
      label: User-data risk
      options:
        - None known
        - Read-only incorrect behavior
        - Possible data loss or corruption
        - Security or privacy exposure
    validations:
      required: true
  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies and cost
      description: Note permissions, accounts, services, signing, or paid boundaries and the available fallback.
    validations:
      required: true
