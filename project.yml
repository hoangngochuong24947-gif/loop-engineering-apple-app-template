name: QuickNote
options:
  bundleIdPrefix: com.loopengineering
  deploymentTarget:
    iOS: "18.0"
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: 6.0
    DEVELOPMENT_TEAM: ""
    CODE_SIGNING_ALLOWED: NO
    PRODUCT_BUNDLE_IDENTIFIER: com.loopengineering.quicknote
targets:
  QuickNote:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Resources/Assets.xcassets
        buildPhase: resources
      - path: Resources/PrivacyInfo.xcprivacy
        buildPhase: resources
    settings:
      base:
        INFOPLIST_FILE: Resources/Info.plist
        PRODUCT_NAME: QuickNote
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
    scheme:
      testTargets:
        - QuickNoteTests
  QuickNoteTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
        includes:
          - "**/*.swift"
    dependencies:
      - target: QuickNote
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.loopengineering.quicknote.tests
